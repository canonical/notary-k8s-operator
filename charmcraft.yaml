name: notary-k8s
type: charm
title: Notary
summary: Certificate management made easy

description: |
  Notary helps you manage certificate requests and their associated certificates.
  Charmed Notary helps you automatically receive CSRs and distribute certificates to the applications
  you've deployed in your model.

links:
  documentation: https://discourse.charmhub.io/t/notary-docs-index/15216
  issues:
    - https://github.com/canonical/notary-k8s-operator/issues
  source:
    - https://github.com/canonical/notary-k8s-operator
  website:
    - https://charmhub.io/notary-k8s

platforms:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

config:
  options:
    external-hostname:
      description: |
        Set the external hostname that Notary expects to be accessed by all parties.
        This will be used as
        - the subject in the generated self-signed certificates if none are provided,
        - the hostname in the CRLDistributionPoint extension in all certificates created by Notary,
        - the hostname in the OIDC integration used by notary.
      type: string

provides:
  certificates:
    interface: tls-certificates
    description: |
      Forwards CSR's from requirers to Notary, and returns the signed certificate back to the requirer.
  send-access-ca-certificate:
    interface: certificate_transfer
    description: |
      Send our CA certificate so any client can trust the Notary workload's TLS certificate.
  metrics:
    interface: prometheus_scrape
  grafana-dashboard:
    interface: grafana_dashboard

requires:
  access-certificates:
    interface: tls-certificates
    description: |
      Notary uses this relation to acquire a certificate for the workload server.
    limit: 1
    optional: true
  logging:
    interface: loki_push_api
  tracing:
    interface: tracing
    limit: 1
    optional: true
  ingress:
    interface: ingress
    limit: 1
    optional: true
  traefik-route:
    interface: traefik_route
    limit: 1
    optional: false

containers:
  notary:
    resource: notary-image
    mounts:
      - storage: config
        location: /etc/notary/config
      - storage: database
        location: /var/lib/notary/database

storage:
  config:
    type: filesystem
    minimum-size: 5M
  database:
    type: filesystem
    minimum-size: 1G

resources:
  notary-image:
    type: oci-image
    description: OCI image for the Notary application
    upstream-source: ghcr.io/canonical/notary:1.0.0

charm-libs:
  - lib: grafana_k8s.grafana_dashboard
    version: "0.36"
  - lib: loki_k8s.loki_push_api
    version: "1.12"
  - lib: prometheus_k8s.prometheus_scrape
    version: "0.47"
  - lib: tempo_coordinator_k8s.charm_tracing
    version: "0.4"
  - lib: tempo_coordinator_k8s.tracing
    version: "0.3"
  - lib: traefik_k8s.ingress
    version: "2.19"
  - lib: traefik_k8s.traefik_route
    version: "0.6"

parts:
  charm:
    source: .
    plugin: charm
    charm-requirements:
      - requirements.txt
    build-packages:
      - libffi-dev
      - libssl-dev
      - pkg-config
    build-snaps:
      - astral-uv
      - rustup
    override-build: |
      rustup default stable
      uv export --frozen --no-dev -o requirements.txt
      craftctl default
